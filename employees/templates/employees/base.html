<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ABC Payroll</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .navbar { background-color: #1a237e; }
        .nav-link { color: rgba(255,255,255,0.8) !important; }
        .nav-link:hover { color: #fff !important; }
        .search-bar { border-radius: 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; }
        .search-bar::placeholder { color: rgba(255,255,255,0.5); }
        .search-bar:focus { background: white; color: black; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">ABC ERP</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'employee_add' %}">Creation</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'global_monthly_process' %}">Payroll Hub</a>
                    </li>
                </ul>

                <form class="d-flex mx-auto w-50" action="{% url 'employee_list' %}" method="GET">
                    <div class="input-group">
                        <input name="search" class="form-control search-bar px-4" type="search" 
                               placeholder="Search by name or ID..." value="{{ request.GET.search|default:'' }}">
                        <button class="btn btn-outline-light border-0" type="submit" style="margin-left: -45px; z-index: 10;">
                            <i class="bi bi-search"></i>
                        </button>
                    </div>
                </form>

                <div class="navbar-nav ms-auto">
                    <a class="nav-link btn btn-outline-light btn-sm px-3 ms-2" href="{% url 'logout' %}">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
