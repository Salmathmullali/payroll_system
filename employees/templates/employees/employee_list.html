{% extends 'employees/base.html' %}
{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-navy">Employee Directory</h2>
        <a href="{% url 'employee_add' %}" class="btn btn-success">Add New Employee</a>
    </div>

    <div class="card shadow border-0">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                    <tr>
                        <th class="ps-4">EMP ID</th>
                        <th>NAME</th>
                        <th>DESIGNATION</th>
                        <th class="text-center">ACTION</th>
                    </tr>
                </thead>
                <tbody>
                    {% for emp in employees %}
                    <tr>
                        <td class="ps-4 fw-bold text-primary">{{ emp.emp_id }}</td>
                        <td>{{ emp.name }}</td>
                        <td>{{ emp.designation }}</td>
                        <td class="text-center">
                            <a href="{% url 'employee_detail' emp.id %}" class="btn btn-sm btn-outline-primary">View Full Profile</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
