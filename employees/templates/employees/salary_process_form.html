{% extends 'employees/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-7">
        <div class="card shadow border-0">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="mb-0 fw-bold">Monthly Salary Processing Center</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">Select Employee</label>
                        <select name="employee_id" class="form-select form-select-lg border-primary" required>
                            <option value="" selected disabled>-- Choose Employee to Process --</option>
                            {% for emp in employees %}
                                <option value="{{ emp.id }}">{{ emp.name }} ({{ emp.emp_id }})</option>
                            {% endfor %}
                        </select>
                        <div class="form-text text-primary">Calculations will be pulled automatically from the Employee Master Record.</div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Salary Month</label>
                            <select name="month" class="form-select" required>
                                <option>January</option><option>February</option><option>March</option>
                                <option>April</option><option>May</option><option>June</option>
                                <option>July</option><option>August</option><option>September</option>
                                <option>October</option><option>November</option><option>December</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Year</label>
                            <input type="number" name="year" class="form-control" value="2026" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Leaves Taken (LOP)</label>
                        <div class="input-group">
                            <input type="number" name="leaves" class="form-control" value="0" min="0">
                            <span class="input-group-text">Days</span>
                        </div>
                        <small class="text-muted">The system will deduct (Basic/30 * Days) automatically.</small>
                    </div>

                    <div class="card bg-light border-0 mb-4 shadow-sm">
                        <div class="card-body">
                            <div class="form-check form-switch mb-3">
                                <input class="form-check-input" type="checkbox" name="manual_mode" id="manualMode">
                                <label class="form-check-label fw-bold text-danger" for="manualMode">
                                    Total Manual Override (Bypass Calculations)
                                </label>
                            </div>
                            
                            <div id="manualInputFields" style="display: none;">
                                <div class="row g-3">
                                    <div class="col-6">
                                        <label class="small fw-bold">Custom Gross Addition</label>
                                        <input type="number" step="0.01" name="custom_earnings" class="form-control" placeholder="0.00">
                                    </div>
                                    <div class="col-6">
                                        <label class="small fw-bold">Custom Deduction</label>
                                        <input type="number" step="0.01" name="custom_deductions" class="form-control" placeholder="0.00">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm fw-bold">
                            <i class="bi bi-calculator me-2"></i> Process & Save Payslip
                        </button>
                        <a href="{% url 'dashboard' %}" class="btn btn-link text-muted">Cancel and Exit</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('manualMode').addEventListener('change', function() {
        const fields = document.getElementById('manualInputFields');
        fields.style.display = this.checked ? 'block' : 'none';
    });
</script>
{% endblock %}
